- generic [active] [ref=e1]:
  - heading "请使用正确的入口登录面板" [level=1] [ref=e2]
  - paragraph [ref=e3]: 错误原因：当前新安装的已经开启了安全入口登录，新装机器都会随机一个8位字符的安全入口名称，亦可以在面板设置处修改，如您没记录或不记得了，可以使用以下方式解决
  - paragraph [ref=e4]: 解决方法：在SSH终端输入以下一种命令来解决
  - paragraph [ref=e5]:
    - text: 1.查看面板入口：
    - code [ref=e6]: /etc/init.d/bt default
  - paragraph [ref=e7]: 注意：【关闭安全入口】将使您的面板登录地址被直接暴露在互联网上，非常危险，请谨慎操作