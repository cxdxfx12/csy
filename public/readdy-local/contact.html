<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="keywords" content="智慧物业,物业管理系统,大圣物业,喵喵至家,杭州物业软件">
<meta name="description" content="联系大圣智慧物业，获取一对一咨询服务">
<title>咨询合作 - 大圣智慧物业管理系统</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#0a0e27;--bg-card:rgba(30,41,59,0.5);--bg-card-hover:rgba(30,41,59,0.8);--accent:#f59e0b;--accent-dark:#d97706;--text-white:#fff;--text-muted:rgba(255,255,255,0.7);--text-dim:rgba(255,255,255,0.5);--border-color:rgba(255,255,255,0.08);--border-hover:rgba(245,158,11,0.3);--gradient-1:linear-gradient(135deg,#f59e0b,#d97706)}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-white);line-height:1.6;min-height:100vh}
a{text-decoration:none;color:inherit}

/* Navbar */
.navbar{background:var(--bg-primary);border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:1000;backdrop-filter:blur(10px)}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}.logo-icon{font-size:24px;color:var(--accent)}
.nav-links{display:flex;gap:6px;flex-wrap:wrap}
.nav-link{color:var(--text-muted);padding:8px 16px;border-radius:10px;font-size:14px;font-weight:500;transition:all .3s;white-space:nowrap}
.nav-link:hover,.nav-link.active{color:var(--accent);background:rgba(245,158,11,0.1)}.nav-link.active{font-weight:600}
.cta-btn{background:var(--accent-dark);color:#fff;padding:10px 28px;border-radius:25px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block}
.cta-btn:hover{background:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(217,119,6,0.4)}

/* Main */
.container{max-width:1200px;margin:0 auto;padding:60px 20px}
.page-hero{text-align:center;padding:80px 0 60px}
.page-hero h1{font-size:42px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-hero p{font-size:18px;color:var(--text-muted);max-width:650px;margin:0 auto}
.section-title{font-size:32px;text-align:center;margin-bottom:16px;font-weight:600}
.section-subtitle{text-align:center;color:var(--text-dim);margin-bottom:50px;font-size:16px}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;margin-bottom:80px}
.card{background:var(--bg-card);border-radius:16px;padding:36px;border:1px solid var(--border-color);transition:all .3s}
.card:hover{transform:translateY(-5px);border-color:var(--border-hover);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.card-icon{width:56px;height:56px;background:var(--gradient-1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px}
.card h3{font-size:21px;margin-bottom:12px}
.card p{color:var(--text-muted);font-size:15px;line-height:1.7;margin-bottom:16px}
.badge-wrap{display:flex;flex-wrap:wrap;gap:8px}
.badge{background:rgba(99,102,241,0.15);color:#a5b4fc;padding:5px 14px;border-radius:6px;font-size:13px}

/* Overview box */
.overview-box{background:linear-gradient(135deg,rgba(30,41,59,0.8),rgba(15,23,42,0.95));border-radius:20px;padding:50px;margin-bottom:80px;border:1px solid rgba(255,255,255,0.05)}
.overview-box h2{font-size:26px;margin-bottom:20px;color:var(--accent)}
.overview-box p{font-size:17px;line-height:1.85;color:var(--text-muted);margin-bottom:24px}
.tags{display:flex;gap:12px;flex-wrap:wrap}
.tag{background:rgba(245,158,11,0.15);color:#fbbf24;padding:9px 22px;border-radius:8px;font-size:14px;border:1px solid rgba(245,158,11,0.25)}

/* Stats */
.stats-row{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin:50px 0;text-align:center}
.stat-item{text-align:center;padding:20px 30px}
.stat-num{font-size:38px;font-weight:700;color:var(--accent);display:block}
.stat-label{font-size:14px;color:var(--text-dim)}

/* Timeline */
.timeline{position:relative;max-width:800px;margin:0 auto 80px;padding-left:30px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),rgba(245,158,11,0.2))}
.tl-item{position:relative;margin-bottom:35px;padding-left:30px}
.tl-item::before{content:'';position:absolute;left:-27px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--bg-primary)}
.tl-time{display:inline-block;background:var(--accent);color:#000;padding:3px 14px;border-radius:6px;font-size:13px;font-weight:700;margin-bottom:8px}
.tl-item h4{font-size:18px;margin-bottom:6px}
.tl-item p{color:var(--text-muted);font-size:14px}

/* Pricing */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:80px}
.price-card{background:var(--bg-card);border-radius:20px;padding:40px 32px;border:1px solid var(--border-color);text-align:center;transition:all .3s;position:relative}
.price-card:hover{transform:translateY(-5px);border-color:var(--border-hover)}
.price-card.popular{border-color:var(--accent);background:rgba(245,158,11,0.06)}
.popular-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--gradient-1);color:#000;padding:4px 20px;border-radius:20px;font-size:13px;font-weight:700}
.price-name{font-size:20px;font-weight:600;margin-bottom:8px}
.price-desc{color:var(--text-dim);font-size:14px;margin-bottom:20px}
.price-amount{font-size:44px;font-weight:800;color:var(--accent);margin-bottom:6px}
.price-period{color:var(--text-dim);font-size:14px;margin-bottom:24px}
.price-features{text-align:left;margin-bottom:28px}
.price-features li{padding:8px 0;font-size:14px;color:var(--text-muted);list-style:none;position:relative;padding-left:24px}
.price-features li::before{content:'✓';position:absolute;left:0;color:var(--accent);font-weight:700}
.price-btn{display:inline-block;width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;text-align:center;text-decoration:none}
.price-btn.primary{background:var(--accent-dark);color:#fff}
.price-btn.primary:hover{background:var(--accent)}
.price-btn.outline{border:2px solid var(--accent);color:var(--accent);background:transparent}
.price-btn.outline:hover{background:rgba(245,158,11,0.1)}

/* Scenes */
.scene-card{background:var(--bg-card);border-radius:20px;padding:45px;border:1px solid var(--border-color);margin-bottom:30px;transition:all .3s}
.scene-card:hover{border-color:var(--border-hover)}
.scene-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.scene-icon{width:56px;height:56px;background:var(--gradient-1);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px}
.scene-header h3{font-size:24px}
.scene-feats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.scene-feats span{color:var(--text-muted);font-size:14px;padding:8px 0 8px 28px;position:relative}
.scene-feats span::before{content:'✅';position:absolute;left:0}

/* Solutions */
.step-list{max-width:750px;margin:0 auto 60px}
.step{display:flex;gap:20px;margin-bottom:28px;align-items:flex-start}
.step-num{min-width:48px;height:48px;background:var(--gradient-1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;flex-shrink:0}
.step-content h4{font-size:18px;margin-bottom:4px}
.step-content p{color:var(--text-muted);font-size:14px}

/* Team */
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;margin-bottom:60px}
.member{background:var(--bg-card);border-radius:16px;padding:35px 25px;text-align:center;border:1px solid var(--border-color);transition:all .3s}
.member:hover{transform:translateY(-4px);border-color:var(--border-hover)}
.avatar{width:72px;height:72px;background:var(--gradient-1);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#000}
.member h4{font-size:18px;margin-bottom:4px}
.role{color:var(--accent);font-size:14px;margin-bottom:10px}
.bio{color:var(--text-dim);font-size:13px}

/* Contact */
.contact-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:60px}
@media(max-width:768px){.contact-wrapper{grid-template-columns:1fr}}
.info-card{background:var(--bg-card);border-radius:16px;padding:36px;border:1px solid var(--border-color)}
.info-card h3{font-size:20px;margin-bottom:20px;color:var(--accent)}
.info-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;font-size:15px}
.info-row i{width:36px;height:36px;background:rgba(245,158,11,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:16px;flex-shrink:0}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:14px;color:var(--text-muted);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;background:rgba(15,23,42,0.6);border:1px solid var(--border-color);border-radius:10px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .3s}
.form-group textarea{resize:vertical;min-height:100px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.submit-btn{width:100%;padding:14px;background:var(--accent-dark);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}
.submit-btn:hover{background:var(--accent)}

/* Certs */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:60px}
.cert-item{background:var(--bg-card);border-radius:14px;padding:30px;border:1px solid var(--border-color);border-left:4px solid var(--accent)}
.cert-item h4{font-size:17px;margin-bottom:8px;color:#fbbf24}
.cert-item p{color:var(--text-muted);font-size:14px}

/* Advantages */
.adv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:60px}
@media(max-width:900px){.adv-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.adv-grid{grid-template-columns:1fr}}
.adv-item{text-align:center;padding:35px 20px;background:var(--bg-card);border-radius:16px;border:1px solid var(--border-color);transition:all .3s}
.adv-item:hover{border-color:var(--border-hover)}
.adv-icon{width:48px;height:48px;background:var(--gradient-1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 16px}
.adv-item h4{font-size:18px;margin-bottom:8px}
.adv-item p{color:var(--text-dim);font-size:14px}

/* CTA section */
.cta-section{text-align:center;padding:70px 40px;background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(217,119,6,0.05));border-radius:24px;margin:60px 0;border:1px solid rgba(245,158,11,0.15)}
.cta-section h2{font-size:30px;margin-bottom:12px}
.cta-section p{color:var(--text-muted);margin-bottom:28px;font-size:16px}

/* Footer */
.footer{text-align:center;padding:30px 20px;border-top:1px solid rgba(255,255,255,0.08);color:var(--text-dim);font-size:13px;margin-top:60px}

/* Mission cards */
.mission-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:50px}
@media(max-width:768px){.mission-cards{grid-template-columns:1fr}}
.mission-card{background:var(--bg-card);border-radius:16px;padding:35px;text-align:center;border:1px solid var(--border-color)}
.mission-card h3{font-size:20px;margin-bottom:10px;color:var(--accent)}
.mission-card p{color:var(--text-muted);font-size:14px}

/* Responsive */
@media(max-width:768px){
  .nav-links{display:none}
  .page-hero h1{font-size:30px}
  .container{padding:40px 16px}
  .card-grid{grid-template-columns:1fr}
  .pricing-grid{grid-template-columns:1fr}
  .stats-row{gap:20px}
  .section-title{font-size:26px}
}
</style>
</head>
