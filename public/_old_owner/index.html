<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>业主服务</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 -apple-system,system-ui,sans-serif;background:#f7f8fc;color:#1a202c;-webkit-tap-highlight-color:transparent}
.page{display:none;min-height:100vh}
.page.active{display:flex;flex-direction:column}
/* Login */
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:80px 24px;background:linear-gradient(180deg,#f7f8fc,#fff)}
.login-wrap .ico{font-size:48px;margin-bottom:4px}
.login-wrap h1{font-size:22px;font-weight:700;margin-bottom:4px;color:#1a202c}
.login-wrap .sub{color:#a0aec0;font-size:13px;margin-bottom:36px}
.inp{display:flex;align-items:center;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:0 14px;margin-bottom:12px;height:46px;width:100%;max-width:340px}
.inp span{font-size:18px;margin-right:10px}
.inp input{flex:1;border:none;outline:none;font-size:15px;height:46px;background:transparent}
.inp input::placeholder{color:#cbd5e0}
.btn{width:100%;max-width:340px;height:46px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-b{background:linear-gradient(135deg,#3182ce,#2b6cb0);color:#fff}
.btn-g{background:#e2e8f0;color:#4a5568}
.btn-r{background:#fc8181;color:#fff}
.btn-o{background:#fff;color:#2b6cb0;border:1px solid #2b6cb0}
.err{color:#e53e3e;text-align:center;margin-top:10px;font-size:14px}
/* Home */
.hd{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:10}
.hd h2{font-size:17px}
.hd .out{font-size:13px;color:#999;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.card{background:#fff;border-radius:14px;padding:22px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.96)}
.card .ic{font-size:34px;margin-bottom:6px;display:block}
.card .lb{font-size:15px;font-weight:600}
.card .ds{font-size:12px;color:#999;margin-top:2px}
/* List */
.list{flex:1;overflow-y:auto;padding:16px}
.item{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.item .r{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.item .r .t{font-weight:600;font-size:14px}
.item .r .v{font-size:14px}
.item .p{font-size:13px;color:#666}
.item .act{margin-top:8px}
.item .act button{font-size:12px;padding:5px 14px;border-radius:6px;border:none;margin-right:6px;cursor:pointer}
.bp{background:#2b6cb0;color:#fff}
.bo{background:#edf2f7;color:#2b6cb0;border:1px solid #2b6cb0}
.br{background:#fff;color:#e53e3e;border:1px solid #e53e3e}
.s-p{background:#bee3f8;color:#2b6cb0;font-size:12px;padding:2px 8px;border-radius:4px}
.s-s{background:#c6f6d5;color:#276749;font-size:12px;padding:2px 8px;border-radius:4px}
.s-d{background:#fed7d7;color:#9b2c2c;font-size:12px;padding:2px 8px;border-radius:4px}
.form{padding:16px}
.form .fg{margin-bottom:14px}
.form label{display:block;font-size:14px;font-weight:600;margin-bottom:4px;color:#555}
.form input,.form select,.form textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.form input:focus,.form select:focus,.form textarea:focus{border-color:#2b6cb0}
.form textarea{min-height:80px;resize:vertical}
.back{display:flex;align-items:center;padding:10px 16px;background:#fff;font-size:15px;color:#2b6cb0;cursor:pointer;border-bottom:1px solid #f0f0f0}
.loading{text-align:center;padding:40px;color:#999}
.empty{text-align:center;padding:60px;color:#bbb;font-size:15px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #f0f0f0}
.tab{flex:1;text-align:center;padding:12px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#666}
.tab.on{color:#2b6cb0;border-color:#2b6cb0;font-weight:600}
.tip{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.user-info{display:flex;align-items:center;gap:12px;padding:16px;background:#fff;border-radius:12px;margin-bottom:12px}
.user-info .av{width:48px;height:48px;border-radius:50%;background:#bee3f8;display:flex;align-items:center;justify-content:center;font-size:20px}
.user-info .r{flex:1}
.user-info .r .n{font-weight:600;font-size:16px}
.user-info .r .p{font-size:13px;color:#999}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = '/api/api';
let token = localStorage.getItem('owner_token') || '';
let userInfo = null;

async function api(method, url, body) {
  const h = {'Content-Type':'application/json'};
  if (userInfo && userInfo.token) h['Authorization'] = 'Bearer ' + userInfo.token;
  if (token && !url.includes('/login') && !url.includes('/register')) h['Authorization'] = 'Bearer ' + token;
  const opts = {method, headers:h};
  if (body && method !== 'GET') opts.body = JSON.stringify(body);
  const r = await fetch(API + url, opts);
  const d = await r.json();
  if (d.code === 1 && d.msg && (d.msg.includes('登录') || d.msg.includes('token'))) { logout(); return null; }
  return d;
}

function logout() { localStorage.removeItem('owner_token'); token = ''; userInfo = null; render('login'); }

function render(page, data) {
  const app = document.getElementById('app');
  switch(page) {
    case 'login': app.innerHTML = `<div class="page active"><div class="login-wrap">
      <div class="ico">🏠</div><h1>业主服务</h1><div class="sub">大圣物业 · 智慧社区</div>
      <div class="inp"><span>📱</span><input id="phone" placeholder="手机号" value="13800138000"></div>
      <div class="inp"><span>🔑</span><input id="pwd" type="password" placeholder="密码" value="123456"></div>
      <button class="btn btn-g" style="margin-bottom:12px" onclick="goRegister()">没有账号？去注册</button>
      <button class="btn btn-b" onclick="doLogin()">登 录</button>
      <div class="err" id="err"></div>
    </div></div>`; break;

    case 'register': app.innerHTML = `<div class="page active"><div class="login-wrap">
      <div class="ico">📝</div><h1>业主注册</h1><div class="sub">加入智慧社区</div>
      <div class="inp"><span>👤</span><input id="rName" placeholder="真实姓名"></div>
      <div class="inp"><span>📱</span><input id="rPhone" placeholder="手机号" value="13800138000"></div>
      <div class="inp"><span>🔑</span><input id="rPwd" type="password" placeholder="密码"></div>
      <div class="inp"><span>🏘️</span><input id="rCommunity" placeholder="小区名称"></div>
      <div class="inp"><span>🏠</span><input id="rRoom" placeholder="房号"></div>
      <button class="btn btn-b" onclick="doRegister()">注 册</button>
      <button class="btn btn-g" style="margin-top:8px" onclick="render('login')">返回登录</button>
      <div class="err" id="err"></div>
    </div></div>`; break;

    case 'home': app.innerHTML = `<div class="page active"><div class="hd"><h2>🏠 业主服务</h2><span class="out" onclick="logout()">退出</span></div>
      <div id="userBlock" class="list"></div>
      <div class="grid">
        <div class="card" onclick="loadRoom()"><span class="ic">🏘️</span><div class="lb">我的房产</div><div class="ds">查看房间</div></div>
        <div class="card" onclick="loadBill()"><span class="ic">💰</span><div class="lb">物业账单</div><div class="ds">在线缴费</div></div>
        <div class="card" onclick="loadRepair()"><span class="ic">🔧</span><div class="lb">报事报修</div><div class="ds">提交工单</div></div>
        <div class="card" onclick="loadComplaint()"><span class="ic">💬</span><div class="lb">投诉建议</div><div class="ds">意见反馈</div></div>
        <div class="card" onclick="loadNotice()"><span class="ic">📢</span><div class="lb">社区公告</div><div class="ds">最新通知</div></div>
        <div class="card" onclick="loadVisitor()"><span class="ic">🚶</span><div class="lb">访客邀请</div><div class="ds">邀约来访</div></div>
      </div></div>`; loadUserInfo(); break;

    case 'room': loadRoom(); break;
    case 'bill': loadBill(); break;
    case 'repair': loadRepair(); break;
    case 'complaint': loadComplaint(); break;
    case 'notice': loadNotice(); break;
    case 'visitor': loadVisitor(); break;
  }
}

// Auth
async function doLogin() {
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  if (!phone || !password) { err.textContent = '请输入手机号和密码'; return; }
  err.textContent = '';
  try {
    const d = await api('POST','/login',{phone,password});
    if (d && d.code === 0) {
      token = d.data.token; userInfo = d.data.userInfo || {};
      if (!userInfo) userInfo = d.data;
      localStorage.setItem('owner_token', token);
      render('home');
    } else { err.textContent = (d && d.msg) || '登录失败'; }
  } catch(e) { err.textContent = '网络错误'; }
}

function goRegister() { render('register'); }

async function doRegister() {
  const err = document.getElementById('err');
  const data = {
    phone: document.getElementById('rPhone').value,
    password: document.getElementById('rPwd').value,
    realname: document.getElementById('rName').value,
    community_name: document.getElementById('rCommunity').value,
    room_name: document.getElementById('rRoom').value
  };
  if (!data.phone || !data.password) { err.textContent = '手机号和密码必填'; return; }
  err.textContent = '';
  try {
    const d = await api('POST','/register',data);
    if (d && d.code === 0) { alert('注册成功，请登录'); render('login'); }
    else { err.textContent = (d && d.msg) || '注册失败'; }
  } catch(e) { err.textContent = '网络错误'; }
}

// Load user info
async function loadUserInfo() {
  try {
    const d = await api('GET','/index/myInfo');
    const ub = document.getElementById('userBlock');
    if (d && d.code === 0 && d.data) {
      userInfo = d.data;
      ub.innerHTML = `<div class="user-info"><div class="av">👤</div><div class="r"><div class="n">${userInfo.realname||userInfo.phone||'业主'}</div><div class="p">${userInfo.room_name||''} | ${userInfo.community_name||''}</div></div></div>`;
    }
  } catch(e) {}
}

// Room
async function loadRoom() {
  buildPage('我的房产','room',async()=>{
    const d = await api('GET','/room/list');
    if (!d||d.code!==0) return showEmpty();
    const list = d.data.list||d.data||[];
    document.getElementById('listBody').innerHTML = list.length ? list.map(r=>`
      <div class="item"><div class="r"><span class="t">${r.room_name||r.name||'房间'}</span><span class="v s-s">${r.area||''}㎡</span></div>
      <div class="p">${r.building_name||r.community_name||''} | ${r.floor||''}层</div></div>`).join('') : '<div class="empty">暂无房产信息</div>';
  });
}

// Bill
async function loadBill() {
  buildPage('物业账单','bill',async()=>{
    const d = await api('GET','/bill/list');
    if (!d||d.code!==0) return showEmpty();
    const list = d.data.list||d.data||[];
    document.getElementById('listBody').innerHTML = list.length ? list.map(b=>`
      <div class="item"><div class="r"><span class="t">${b.item_name||b.charge_item||'账单'}</span><span class="v s-d">¥${b.amount||b.total||0}</span></div>
      <div class="p">${b.room_name||''} | ${b.period||b.year_month||''}</div>
      <div class="p">状态：<b style="color:${b.status==='paid'||b.pay_status===1?'#276749':'#e53e3e'}">${b.status==='paid'||b.pay_status===1?'已缴费':'待缴费'}</b></div>
      ${b.status!=='paid'&&b.pay_status!==1?`<div class="act"><button class="bp" onclick="payBill(${b.id},${b.amount||b.total||0})">在线缴费</button></div>`:''}</div>`).join('') : '<div class="empty">暂无账单</div>';
  });
}
async function payBill(id,amount) {
  if (!confirm(`确认支付 ¥${amount}？`)) return;
  const d = await api('POST','/bill/pay',{id});
  if (d&&d.code===0) { alert('支付成功'); loadBill(); }
  else { alert((d&&d.msg)||'支付失败'); }
}

// Repair
async function loadRepair() {
  buildPage('报事报修','repair',async()=>{
    const d = await api('GET','/repair/list');
    if (!d||d.code!==0) return showEmpty();
    const list = d.data.list||d.data||[];
    document.getElementById('listBody').innerHTML = (list.length ? list.map(r=>`
      <div class="item"><div class="r"><span class="t">${r.repair_type||r.type||'维修'}</span><span class="s ${r.status==='finished'?'s-s':r.status==='pending'?'s-p':'s-d'}">${r.status==='finished'?'已完成':r.status==='accepted'?'处理中':'待处理'}</span></div>
      <div class="p">${r.content||r.description||''}</div><div class="p">${r.create_time||r.time||''}</div></div>`).join('') : '<div class="empty">暂无报修记录</div>') +
      `<div style="margin-top:14px"><button class="btn btn-b" onclick="showRepairForm()">+ 提交报修</button></div>`;
    if (!document.getElementById('repairForm')) {
      const f = document.createElement('div'); f.id = 'repairForm'; f.style.display = 'none';
      f.innerHTML = `<div class="form"><h4 style="margin-bottom:12px">提交报修</h4>
        <div class="fg"><label>报修类型</label><select id="repType"><option>水管维修</option><option>电路维修</option><option>门锁维修</option><option>空调维修</option><option>电梯故障</option><option>其他</option></select></div>
        <div class="fg"><label>详细描述</label><textarea id="repContent" placeholder="请描述具体问题"></textarea></div>
        <div class="fg"><label>紧急程度</label><select id="repUrgent"><option value="normal">普通</option><option value="urgent">紧急</option></select></div>
        <button class="btn btn-b" onclick="submitRepair()">提交</button>
        <button class="btn btn-g" style="margin-top:8px" onclick="document.getElementById('repairForm').style.display='none'">取消</button></div>`;
      document.querySelector('#listBody').parentNode.appendChild(f);
    }
  });
}
function showRepairForm() { document.getElementById('repairForm').style.display = 'block'; }
async function submitRepair() {
  const d = await api('POST','/repair/add',{repair_type:document.getElementById('repType').value,content:document.getElementById('repContent').value,urgent:document.getElementById('repUrgent').value});
  if (d&&d.code===0) { alert('提交成功'); document.getElementById('repairForm').style.display = 'none'; loadRepair(); }
}

// Complaint
async function loadComplaint() {
  buildPage('投诉建议','complaint',async()=>{
    const d = await api('GET','/complaint/list');
    if (!d||d.code!==0) return showEmpty();
    const list = d.data.list||d.data||[];
    document.getElementById('listBody').innerHTML = (list.length ? list.map(c=>`
      <div class="item"><div class="r"><span class="t">${c.title||c.type||'投诉'}</span><span class="s ${c.status==='resolved'?'s-s':'s-p'}">${c.status==='resolved'?'已处理':'待处理'}</span></div>
      <div class="p">${c.content||''}</div><div class="p">${c.create_time||''} ${c.reply?'| 回复：'+c.reply:''}</div></div>`).join('') : '<div class="empty">暂无投诉记录</div>') +
      `<div style="margin-top:14px"><button class="btn btn-b" onclick="showComplaintForm()">+ 提交投诉</button></div>`;
    if (!document.getElementById('complaintForm')) {
      const f = document.createElement('div'); f.id = 'complaintForm'; f.style.display = 'none';
      f.innerHTML = `<div class="form"><h4 style="margin-bottom:12px">提交投诉建议</h4>
        <div class="fg"><label>标题</label><input id="cTitle"></div>
        <div class="fg"><label>详细内容</label><textarea id="cContent"></textarea></div>
        <button class="btn btn-b" onclick="submitComplaint()">提交</button>
        <button class="btn btn-g" style="margin-top:8px" onclick="document.getElementById('complaintForm').style.display='none'">取消</button></div>`;
      document.querySelector('#listBody').parentNode.appendChild(f);
    }
  });
}
function showComplaintForm() { document.getElementById('complaintForm').style.display = 'block'; }
async function submitComplaint() {
  const d = await api('POST','/complaint/add',{title:document.getElementById('cTitle').value,content:document.getElementById('cContent').value});
  if (d&&d.code===0) { alert('提交成功'); document.getElementById('complaintForm').style.display = 'none'; loadComplaint(); }
}

// Notice
async function loadNotice() {
  buildPage('社区公告','notice',async()=>{
    const d = await api('GET','/notice/list');
    if (!d||d.code!==0) return showEmpty();
    const list = d.data.list||d.data||[];
    document.getElementById('listBody').innerHTML = list.length ? list.map(n=>`
      <div class="item"><div class="r"><span class="t">${n.title||'公告'}</span><span class="s s-p">${n.create_time||n.time||''}</span></div>
      <div class="p">${n.content||n.summary||''}</div></div>`).join('') : '<div class="empty">暂无公告</div>';
  });
}

// Visitor
async function loadVisitor() {
  buildPage('访客邀请','visitor',async()=>{
    const d = await api('GET','/visitor/list');
    if (!d||d.code!==0) return showEmpty();
    const list = d.data.list||d.data||[];
    document.getElementById('listBody').innerHTML = (list.length ? list.map(v=>`
      <div class="item"><div class="r"><span class="t">${v.visitor_name||'访客'}</span><span class="s s-p">${v.visit_time||v.create_time||''}</span></div>
      <div class="p">手机：${v.phone||''} | 事由：${v.reason||''}</div></div>`).join('') : '<div class="empty">暂无访客记录</div>') +
      `<div style="margin-top:14px"><button class="btn btn-b" onclick="showVisitorForm()">+ 邀请访客</button></div>`;
    if (!document.getElementById('visitorForm')) {
      const f = document.createElement('div'); f.id = 'visitorForm'; f.style.display = 'none';
      f.innerHTML = `<div class="form"><h4 style="margin-bottom:12px">邀请访客</h4>
        <div class="fg"><label>访客姓名</label><input id="vName"></div>
        <div class="fg"><label>手机号</label><input id="vPhone"></div>
        <div class="fg"><label>访问事由</label><input id="vReason"></div>
        <div class="fg"><label>访问时间</label><input id="vTime" type="date"></div>
        <button class="btn btn-b" onclick="submitVisitor()">提交邀请</button>
        <button class="btn btn-g" style="margin-top:8px" onclick="document.getElementById('visitorForm').style.display='none'">取消</button></div>`;
      document.querySelector('#listBody').parentNode.appendChild(f);
    }
  });
}
function showVisitorForm() { document.getElementById('visitorForm').style.display = 'block'; }
async function submitVisitor() {
  const d = await api('POST','/visitor/add',{visitor_name:document.getElementById('vName').value,phone:document.getElementById('vPhone').value,reason:document.getElementById('vReason').value,visit_time:document.getElementById('vTime').value});
  if (d&&d.code===0) { alert('邀请成功'); document.getElementById('visitorForm').style.display = 'none'; loadVisitor(); }
}

// Helpers
function buildPage(title,page,loadFn) {
  document.getElementById('app').innerHTML = `<div class="page active" style="flex-direction:column">
    <div class="hd"><span class="back" onclick="render('home')">← 返回</span><h2>${title}</h2><span style="width:50px"></span></div>
    <div id="listBody" class="list"><div class="loading">加载中...</div></div></div>`;
  loadFn();
}
function showEmpty() {
  const el = document.getElementById('listBody');
  if (el) el.innerHTML = '<div class="empty">暂无数据</div>';
}

// Init
if (token) render('home'); else render('login');
</script>
</body>
</html>
