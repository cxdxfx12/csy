<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>物业员工端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 -apple-system,system-ui,sans-serif;background:#f0f2f5;color:#333;-webkit-tap-highlight-color:transparent}
.page{display:none;min-height:100vh}
.page.active{display:flex;flex-direction:column}
/* Login */
.login-bg{background:linear-gradient(180deg,#2b6cb0,#2c5282)}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:80px 24px}
.login-ico{font-size:56px;margin-bottom:4px}
.login-wrap h1{color:#fff;font-size:22px;font-weight:700}
.login-wrap .sub{color:rgba(255,255,255,.6);font-size:13px;margin:4px 0 36px}
.inp{display:flex;align-items:center;background:rgba(255,255,255,.15);border-radius:10px;padding:0 14px;margin-bottom:12px;height:46px;width:100%;max-width:340px}
.inp span{font-size:18px;margin-right:10px}
.inp input{flex:1;bg:none;border:none;outline:none;color:#fff;font-size:15px;height:46px;background:transparent}
.inp input::placeholder{color:rgba(255,255,255,.5)}
.btn{width:100%;max-width:340px;height:46px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-p{background:#fff;color:#2b6cb0}
.btn-b{background:linear-gradient(135deg,#3182ce,#2b6cb0);color:#fff}
.btn-g{background:#e2e8f0;color:#4a5568}
.err{color:#fc8181;text-align:center;margin-top:10px;font-size:14px}
/* Home */
.hd{background:#2b6cb0;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.hd h2{font-size:17px}
.hd .out{font-size:13px;opacity:.8;cursor:pointer}
.hd .out:hover{opacity:1}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
.card{background:#fff;border-radius:12px;padding:24px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.96)}
.card .ic{font-size:36px;margin-bottom:8px;display:block}
.card .lb{font-size:15px;font-weight:600;margin-bottom:2px}
.card .ds{font-size:12px;color:#999}
/* List */
.list{flex:1;overflow-y:auto;padding:16px}
.item{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.item .r{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.item .r .t{font-weight:600;font-size:15px}
.item .r .s{font-size:12px;padding:2px 8px;border-radius:4px}
.s-p{background:#bee3f8;color:#2b6cb0}
.s-s{background:#c6f6d5;color:#276749}
.s-d{background:#fed7d7;color:#9b2c2c}
.s-y{background:#fefcbf;color:#975a16}
.item .p{font-size:13px;color:#666}
.item .act{margin-top:8px}
.item .act button{font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid #2b6cb0;background:#fff;color:#2b6cb0;margin-right:6px;cursor:pointer}
.item .act button.primary{background:#2b6cb0;color:#fff}
/* Form */
.form{padding:20px}
.form .fg{margin-bottom:14px}
.form label{display:block;font-size:14px;font-weight:600;margin-bottom:4px;color:#555}
.form input,.form select,.form textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.form input:focus,.form select:focus,.form textarea:focus{border-color:#2b6cb0}
.form textarea{min-height:80px;resize:vertical}
.loading{text-align:center;padding:40px;color:#999}
.empty{text-align:center;padding:60px 20px;color:#bbb;font-size:15px}
/* Back */
.back{display:flex;align-items:center;padding:10px 16px;background:#fff;font-size:15px;color:#2b6cb0;cursor:pointer;border-bottom:1px solid #f0f0f0}
.tabs{display:flex;background:#fff;border-bottom:1px solid #f0f0f0}
.tab{flex:1;text-align:center;padding:12px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#666}
.tab.on{color:#2b6cb0;border-color:#2b6cb0;font-weight:600}
/* stat boxes */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.stat{background:#fff;border-radius:12px;padding:20px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .n{font-size:32px;font-weight:700;color:#2b6cb0}
.stat .l{font-size:13px;color:#999;margin-top:4px}
.pad{padding:16px}
.tit{font-size:16px;font-weight:600;margin:16px 16px 8px;color:#333}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = '/api/staff';
let token = localStorage.getItem('staff_token') || '';

async function api(method, url, body) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers: h };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + url, opts);
  const d = await r.json();
  if (d.code === 1 && d.msg && d.msg.includes('登录')) { logout(); return null; }
  return d;
}

function logout() {
  localStorage.removeItem('staff_token');
  token = '';
  render('login');
}

function render(page, data) {
  const app = document.getElementById('app');
  switch (page) {
    case 'login': app.innerHTML = `
      <div class="page active login-bg"><div class="login-wrap">
        <div class="login-ico">🏢</div><h1>物业员工端</h1><div class="sub">大圣物业管理系统</div>
        <div class="inp"><span>👤</span><input id="uname" placeholder="员工账号" value="admin"></div>
        <div class="inp"><span>🔒</span><input id="upwd" type="password" placeholder="登录密码" value="cxdxfx12"></div>
        <button class="btn btn-p" onclick="doLogin()">登 录</button>
        <div class="err" id="err"></div>
      </div></div>`; break;

    case 'home': app.innerHTML = `
      <div class="page active"><div class="hd"><h2>🏢 物业员工端</h2><span class="out" onclick="logout()">退出</span></div>
      <div class="grid">
        <div class="card" onclick="render('repair')"><span class="ic">🔧</span><div class="lb">报修处理</div><div class="ds">接单 & 维修</div></div>
        <div class="card" onclick="render('meter')"><span class="ic">📊</span><div class="lb">抄表录入</div><div class="ds">水电气表</div></div>
        <div class="card" onclick="render('charge')"><span class="ic">💰</span><div class="lb">移动收费</div><div class="ds">现场收缴</div></div>
        <div class="card" onclick="render('patrol')"><span class="ic">🛡️</span><div class="lb">安保巡更</div><div class="ds">打卡巡更</div></div>
        <div class="card" onclick="render('visitor')"><span class="ic">🚶</span><div class="lb">访客登记</div><div class="ds">来访管理</div></div>
        <div class="card" onclick="render('order')"><span class="ic">📋</span><div class="lb">工单管理</div><div class="ds">任务工单</div></div>
      </div></div>`; break;

    case 'repair': loadRepair(); break;
    case 'meter': loadMeter(); break;
    case 'charge': loadCharge(); break;
    case 'patrol': loadPatrol(); break;
    case 'visitor': loadVisitor(); break;
    case 'order': loadOrder(); break;
  }
}

async function doLogin() {
  const u = document.getElementById('uname').value;
  const p = document.getElementById('upwd').value;
  const err = document.getElementById('err');
  if (!u || !p) { err.textContent = '请输入账号和密码'; return; }
  err.textContent = '';
  try {
    const r = await fetch(API + '/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
    const d = await r.json();
    if (d.code === 0) { token = d.data.token; localStorage.setItem('staff_token', token); render('home'); }
    else { err.textContent = d.msg || '登录失败'; }
  } catch(e) { err.textContent = '网络错误'; }
}

// ---- Repair ----
async function loadRepair() { buildList('报修处理', 'repair', ['pending','accepted','finished'], '🔧', loadRepairList, [{label:'全部'},{label:'待接单',key:'pending'},{label:'已接单',key:'accepted'},{label:'已完成',key:'finished'}]); }
async function loadRepairList(status) {
  const d = await api('GET', '/repair/list' + (status ? '?status=' + status : ''));
  if (!d || d.code !== 0) return showEmpty();
  const list = d.data.list || d.data || [];
  document.getElementById('listBody').innerHTML = list.length ? list.map(r => `
    <div class="item">
      <div class="r"><span class="t">${r.order_no||r.id}</span><span class="s ${r.status==='finished'?'s-s':r.status==='accepted'?'s-y':'s-p'}">${r.status==='pending'?'待接单':r.status==='accepted'?'处理中':r.status==='finished'?'已完成':(r.status||'')}</span></div>
      <div class="p">${r.repair_type||r.content||''} | ${r.room_name||r.address||''}</div>
      <div class="p">报修人：${r.owner_name||''} ${r.phone||''}</div>
      ${r.status !== 'finished' ? `<div class="act">${r.status==='pending'?`<button class="primary" onclick="acceptRepair(${r.id})">接单</button>`:''}${r.status==='accepted'?`<button class="primary" onclick="finishRepair(${r.id})">完工</button>`:''}</div>`:''}
    </div>`).join('') : '<div class="empty">暂无报修工单</div>';
}
async function acceptRepair(id) { const d = await api('POST', '/repair/accept', {id}); if (d && d.code===0) { alert('已接单'); loadRepairList('pending'); } }
async function finishRepair(id) { const d = await api('POST', '/repair/finish', {id}); if (d && d.code===0) { alert('已完成'); loadRepairList('accepted'); } }

// ---- Meter ----
async function loadMeter() {
  buildList('抄表录入', 'meter', [], '📊', async () => {
    const d = await api('GET', '/meter/list');
    if (!d || d.code !== 0) return showEmpty();
    const list = d.data.list || d.data || [];
    document.getElementById('listBody').innerHTML = list.length ? list.map(m => `
      <div class="item">
        <div class="r"><span class="t">${m.room_name||m.room_id}</span><span class="s s-p">本月读数：${m.last_reading||'--'}</span></div>
        <div class="p">表类型：${m.meter_type||'电表'} | 上次：${m.before_reading||'--'}</div>
        <div class="act"><button class="primary" onclick="readMeter(${m.id},'${m.room_name||''}')">录入</button></div>
      </div>`).join('') : '<div class="empty">暂无需抄表的房间</div>';
    if (!document.getElementById('meterForm')) {
      const f = document.createElement('div'); f.id = 'meterForm';
      f.innerHTML = `<div class="form" id="mf"><h4 style="margin-bottom:12px">录入读数 - <span id="mRoom"></span></h4>
        <div class="fg"><label>本次读数</label><input id="mReading" type="number" step="0.01" placeholder="输入表读数"></div>
        <button class="btn btn-b" onclick="submitMeter()">提 交</button>
        <button class="btn btn-g" style="margin-top:8px" onclick="document.getElementById('meterForm').style.display='none'">取消</button>
      </div>`;
      f.style.display = 'none';
      document.querySelector('#listBody').parentNode.insertBefore(f, document.querySelector('#listBody').nextSibling);
    }
  });
}
window._meterId = null;
function readMeter(id, name) {
  window._meterId = id;
  document.getElementById('mRoom').textContent = name;
  document.getElementById('mReading').value = '';
  document.getElementById('meterForm').style.display = 'block';
}
async function submitMeter() {
  const reading = document.getElementById('mReading').value;
  if (!reading) return alert('请输入读数');
  const d = await api('POST', '/meter/read', {id: window._meterId, reading: parseFloat(reading)});
  if (d && d.code === 0) { alert('录入成功'); document.getElementById('meterForm').style.display = 'none'; loadMeter(); }
}

// ---- Charge ----
async function loadCharge() {
  buildList('移动收费', 'charge', [], '💰', async () => {
    const d = await api('GET', '/charge/unpaidList');
    if (!d || d.code !== 0) return showEmpty();
    const list = d.data.list || d.data || [];
    document.getElementById('listBody').innerHTML = list.length ? list.map(c => `
      <div class="item">
        <div class="r"><span class="t">${c.room_name||c.room_id}</span><span class="s s-d">¥${c.amount||c.total||0}</span></div>
        <div class="p">${c.item_name||c.charge_item||''} | ${c.owner_name||''}</div>
        <div class="act"><button class="primary" onclick="collectCharge(${c.id},${c.amount||c.total||0})">收款</button></div>
      </div>`).join('') : '<div class="empty">暂无待缴费账单</div>';
  });
}
async function collectCharge(id, amount) {
  if (!confirm(`确认收款 ¥${amount}？`)) return;
  const d = await api('POST', '/charge/collect', {id, amount});
  if (d && d.code === 0) { alert('收款成功'); loadCharge(); }
}

// ---- Patrol ----
async function loadPatrol() {
  buildList('安保巡更', 'patrol', [], '🛡️', async () => {
    const d = await api('GET', '/patrol/routes');
    if (!d || d.code !== 0) return showEmpty();
    const list = d.data.list || d.data || [];
    document.getElementById('listBody').innerHTML = list.length ? list.map(p => `
      <div class="item">
        <div class="r"><span class="t">${p.name||p.route_name||'巡更点'}</span><span class="s ${p.checked?'s-s':'s-y'}">${p.checked?'已打卡':'待打卡'}</span></div>
        <div class="p">位置：${p.location||p.position||''}</div>
        ${!p.checked ? `<div class="act"><button class="primary" onclick="checkPatrol(${p.id})">打卡</button></div>` : `<div class="p">打卡时间：${p.check_time||''}</div>`}
      </div>`).join('') : '<div class="empty">暂无巡更路线</div>';
  });
}
async function checkPatrol(id) {
  const d = await api('POST', '/patrol/check', {id});
  if (d && d.code === 0) { alert('打卡成功'); loadPatrol(); }
}

// ---- Visitor ----
async function loadVisitor() {
  buildList('访客登记', 'visitor', [], '🚶', async () => {
    const d = await api('GET', '/visitor/list');
    if (!d || d.code !== 0) return showEmpty();
    const list = d.data.list || d.data || [];
    document.getElementById('listBody').innerHTML = (list.length ? list.map(v => `
      <div class="item">
        <div class="r"><span class="t">${v.visitor_name||'访客'}</span><span class="s s-p">${v.visit_time||v.create_time||''}</span></div>
        <div class="p">被访人：${v.owner_name||v.host_name||''} | ${v.phone||''}</div>
        <div class="p">访问事由：${v.reason||v.purpose||''}</div>
      </div>`).join('') : '<div class="empty">暂无访客记录</div>') +
      `<div style="margin-top:16px"><button class="btn btn-b" onclick="showVisitorForm()">+ 登记访客</button></div>`;
    if (!document.getElementById('visitorForm')) {
      const f = document.createElement('div'); f.id = 'visitorForm'; f.style.display = 'none';
      f.innerHTML = `<div class="form"><h4 style="margin-bottom:12px">登记访客</h4>
        <div class="fg"><label>访客姓名</label><input id="vName"></div>
        <div class="fg"><label>手机号</label><input id="vPhone"></div>
        <div class="fg"><label>被访人/房号</label><input id="vOwner"></div>
        <div class="fg"><label>访问事由</label><input id="vReason"></div>
        <button class="btn btn-b" onclick="submitVisitor()">提交</button>
        <button class="btn btn-g" style="margin-top:8px" onclick="document.getElementById('visitorForm').style.display='none'">取消</button>
      </div>`;
      document.querySelector('#listBody').parentNode.appendChild(f);
    }
  });
}
function showVisitorForm() { document.getElementById('visitorForm').style.display = 'block'; }
async function submitVisitor() {
  const d = await api('POST', '/visitor/add', { visitor_name:document.getElementById('vName').value, phone:document.getElementById('vPhone').value, owner_name:document.getElementById('vOwner').value, reason:document.getElementById('vReason').value });
  if (d && d.code === 0) { alert('登记成功'); loadVisitor(); }
}

// ---- Order ----
async function loadOrder() {
  buildList('工单管理', 'order', [], '📋', async () => {
    const d = await api('GET', '/order/list');
    if (!d || d.code !== 0) return showEmpty();
    const list = d.data.list || d.data || [];
    document.getElementById('listBody').innerHTML = list.length ? list.map(o => `
      <div class="item">
        <div class="r"><span class="t">${o.title||o.order_no||'工单'}</span><span class="s ${o.status==='finished'?'s-s':'s-y'}">${o.status||'待处理'}</span></div>
        <div class="p">${o.content||o.description||''}</div>
        <div class="p">日期：${o.create_time||''}</div>
      </div>`).join('') : '<div class="empty">暂无工单</div>';
  });
}

// ---- Helpers ----
function buildList(title, page, tabs, icon, loadFn, tabItems) {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="page active" style="flex-direction:column">
    <div class="hd"><span class="back" onclick="render('home')">← 返回</span><h2>${icon} ${title}</h2><span style="width:50px"></span></div>
    <div id="listBody" class="list"><div class="loading">加载中...</div></div>
  </div>`;
  loadFn();
}
function showEmpty() {
  const el = document.getElementById('listBody');
  if (el) el.innerHTML = '<div class="empty">暂无数据</div>';
}

// Init
if (token) render('home'); else render('login');
</script>
</body>
</html>
