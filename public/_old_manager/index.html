<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>领导驾驶舱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 -apple-system,system-ui,sans-serif;background:#1a202c;color:#fff;-webkit-tap-highlight-color:transparent}
.page{display:none;min-height:100vh}
.page.active{display:flex;flex-direction:column}
/* Login */
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:80px 24px}
.login-ico{font-size:52px;margin-bottom:8px}
.login-wrap h1{font-size:24px;font-weight:700;margin-bottom:4px}
.login-wrap .sub{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:36px}
.inp{display:flex;align-items:center;background:rgba(255,255,255,.08);border-radius:10px;padding:0 14px;margin-bottom:12px;height:46px;width:100%;max-width:340px}
.inp span{font-size:18px;margin-right:10px}
.inp input{flex:1;border:none;outline:none;background:transparent;color:#fff;font-size:15px;height:46px}
.inp input::placeholder{color:rgba(255,255,255,.4)}
.btn{width:100%;max-width:340px;height:46px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-p{background:linear-gradient(135deg,#3182ce,#2b6cb0);color:#fff}
.btn-g{background:rgba(255,255,255,.15);color:#fff}
.err{color:#fc8181;text-align:center;margin-top:10px;font-size:14px}
/* Dashboard */
.dh{background:linear-gradient(135deg,#2d3748,#1a202c);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:10}
.dh h2{font-size:17px;color:#fff}
.dh .out{font-size:13px;color:rgba(255,255,255,.6);cursor:pointer}
.dh .out:hover{color:#fff}
.content{padding:16px;overflow-y:auto;flex:1}
/* stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:rgba(255,255,255,.06);border-radius:12px;padding:16px 10px;text-align:center}
.stat .n{font-size:26px;font-weight:700}
.stat .l{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
.accent1{color:#63b3ed}
.accent2{color:#68d391}
.accent3{color:#fc8181}
.accent4{color:#f6e05e}
.accent5{color:#b794f4}
.accent6{color:#fbb6ce}
/* chart placeholder */
.chart{background:rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:14px}
.chart h3{font-size:15px;margin-bottom:12px;color:rgba(255,255,255,.8)}
.bar{display:flex;align-items:flex-end;height:120px;gap:8px;padding-top:8px}
.bar .b{flex:1;border-radius:4px 4px 0 0;min-width:20px;position:relative}
.bar .b span{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap}
.bar .b .v{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.8);white-space:nowrap}
/* list in dark */
.ditem{background:rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.ditem .r{display:flex;justify-content:space-between;margin-bottom:4px}
.ditem .r .t{font-weight:600;font-size:14px}
.ditem .r .v{font-size:14px}
.ditem .p{font-size:12px;color:rgba(255,255,255,.4)}
.s-b{color:#63b3ed}
.s-g{color:#68d391}
.s-r{color:#fc8181}
.s-y{color:#f6e05e}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.4)}
.empty{text-align:center;padding:60px;color:rgba(255,255,255,.3)}
.refresh{text-align:center;margin:12px 0}
.refresh button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 20px;border-radius:6px;cursor:pointer;font-size:13px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = '/api/manager';
let token = localStorage.getItem('manager_token') || '';

async function api(url) {
  const h = {};
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + url, { headers: h });
  const d = await r.json();
  if (d.code === 1 && d.msg && d.msg.includes('登录')) { logout(); return null; }
  return d;
}

function logout() { localStorage.removeItem('manager_token'); token = ''; render('login'); }

function render(page) {
  const app = document.getElementById('app');
  if (page === 'login') {
    app.innerHTML = `<div class="page active"><div class="login-wrap">
      <div class="login-ico">📊</div><h1>领导驾驶舱</h1><div class="sub">大圣物业 · 管理后台</div>
      <div class="inp"><span>👤</span><input id="uname" placeholder="经理账号" value="admin"></div>
      <div class="inp"><span>🔒</span><input id="upwd" type="password" placeholder="密码" value="cxdxfx12"></div>
      <button class="btn btn-p" onclick="doLogin()">登 录</button>
      <div class="err" id="err"></div>
    </div></div>`;
  } else if (page === 'dashboard') {
    app.innerHTML = `<div class="page active"><div class="dh"><h2>📊 领导驾驶舱</h2><span class="out" onclick="logout()">退出</span></div>
      <div class="content" id="dashContent"><div class="loading">加载中...</div></div>
      <div class="refresh"><button onclick="loadDashboard()">刷新数据</button></div></div>`;
    loadDashboard();
  }
}

async function doLogin() {
  const u = document.getElementById('uname').value;
  const p = document.getElementById('upwd').value;
  const err = document.getElementById('err');
  if (!u || !p) { err.textContent = '请输入账号和密码'; return; }
  err.textContent = '';
  try {
    const r = await fetch(API + '/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) });
    const d = await r.json();
    if (d.code === 0) { token = d.data.token; localStorage.setItem('manager_token', token); render('dashboard'); }
    else { err.textContent = d.msg || '登录失败'; }
  } catch(e) { err.textContent = '网络错误'; }
}

async function loadDashboard() {
  const dc = document.getElementById('dashContent');
  dc.innerHTML = '<div class="loading">加载中...</div>';

  try {
    const [stats, income, repair, owner, rank, todo, chargeRate] = await Promise.all([
      api('/dashboard/statistics'), api('/dashboard/incomeTrend'),
      api('/dashboard/repairStats'), api('/dashboard/ownerStats'),
      api('/dashboard/communityRank'), api('/dashboard/pendingTodo'),
      api('/dashboard/chargeRate')
    ]);

    let html = '';

    // Stats cards - backend: total_communities, total_owners, total_rooms, month_income, unpaid_amount, charge_rate
    if (stats && stats.code === 0) {
      const s = stats.data;
      html += `<div class="stats">
        <div class="stat"><div class="n accent1">${s.total_communities||0}</div><div class="l">管理小区</div></div>
        <div class="stat"><div class="n accent2">${s.total_owners||0}</div><div class="l">业主总数</div></div>
        <div class="stat"><div class="n accent3">${s.total_rooms||0}</div><div class="l">房产总数</div></div>
        <div class="stat"><div class="n accent4">¥${s.month_income||0}</div><div class="l">本月收入</div></div>
        <div class="stat"><div class="n accent5">${s.charge_rate||0}%</div><div class="l">收费率</div></div>
        <div class="stat"><div class="n accent6">¥${s.unpaid_amount||0}</div><div class="l">待收金额</div></div>
      </div>`;
    }

    // Income trend - backend: {months:[], income:[]}
    if (income && income.code === 0) {
      const d = income.data;
      const months = d.months || [];
      const values = d.income || [];
      if (months.length) {
        const maxVal = Math.max(...values, 1);
        html += `<div class="chart"><h3>📈 收入趋势</h3><div class="bar">${months.map((m,i) =>
          `<div class="b" style="height:${(values[i]/maxVal*100)}%;background:linear-gradient(180deg,#63b3ed,rgba(99,179,237,.3))"><span class="v">${values[i]}</span><span>${m}</span></div>`
        ).join('')}</div></div>`;
      }
    }

    // Repair stats - backend: {total, pending, processing, finished}
    if (repair && repair.code === 0) {
      const r = repair.data;
      html += `<div class="chart"><h3>🔧 报修统计</h3>
        <div class="grid2">
          <div class="stat"><div class="n accent3">${r.pending||0}</div><div class="l">待处理</div></div>
          <div class="stat"><div class="n accent4">${r.processing||0}</div><div class="l">处理中</div></div>
          <div class="stat"><div class="n accent2">${r.finished||0}</div><div class="l">已完成</div></div>
          <div class="stat"><div class="n accent1">${r.total||0}</div><div class="l">总工单</div></div>
        </div></div>`;
    }

    // Owner stats - backend: {total, newThisMonth}
    if (owner && owner.code === 0) {
      const o = owner.data;
      html += `<div class="chart"><h3>👥 业主统计</h3>
        <div class="grid2">
          <div class="stat"><div class="n accent1">${o.total||0}</div><div class="l">业主总数</div></div>
          <div class="stat"><div class="n accent2">${o.newThisMonth||0}</div><div class="l">本月新增</div></div>
        </div></div>`;
    }

    // Community rank - backend: [{id, name, room_count, owner_count, income}, ...]
    if (rank && rank.code === 0) {
      const list = Array.isArray(rank.data) ? rank.data : (rank.data.list || []);
      if (list.length) {
        html += `<div class="chart"><h3>🏘️ 小区排行榜</h3>${list.map((c,i) => `
          <div class="ditem"><div class="r"><span class="t">${i+1}. ${c.name||''}</span><span class="v ${i===0?'s-y':i===1?'s-b':'s-g'}">¥${c.income||0}</span></div><div class="p">${c.owner_count||0}户 | ${c.room_count||0}套</div></div>
        `).join('')}</div>`;
      }
    }

    // Pending todos - backend: [{title, count, icon}, ...]
    if (todo && todo.code === 0) {
      const list = Array.isArray(todo.data) ? todo.data : (todo.data.list || []);
      html += `<div class="chart"><h3>⏳ 待处理事项</h3>${list.length ? list.map(t => `
        <div class="ditem"><div class="r"><span class="t">${t.icon||'📌'} ${t.title||''}</span><span class="v accent3">${t.count||0}条</span></div></div>
      `).join('') : '<div class="empty">暂无待处理事项</div>'}</div>`;
    }

    // Charge rate - backend: [{community, rate}, ...]
    if (chargeRate && chargeRate.code === 0) {
      const list = Array.isArray(chargeRate.data) ? chargeRate.data : (chargeRate.data.list || []);
      if (list.length) {
        html += `<div class="chart"><h3>💰 各小区收费率</h3>${list.map(c => `
          <div class="ditem"><div class="r"><span class="t">${c.community||''}</span><span class="v s-s">${c.rate||0}%</span></div></div>
        `).join('')}</div>`;
      }
    }

    dc.innerHTML = html || '<div class="empty">暂无统计数据</div>';
  } catch(e) {
    dc.innerHTML = '<div class="empty">数据加载失败：'+e.message+'</div>';
  }
}

if (token) render('dashboard'); else render('login');
</script>
</body>
</html>
